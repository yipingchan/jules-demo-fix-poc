<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待辦清單</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --container-bg: #ffffff;
      --text-color: #333333;
      --input-border: #cccccc;
      --stats-bg: #e9ecef;
      --stats-text: #555555;
      --li-border: #eeeeee;
      --empty-msg-color: #888888;
      --shadow-color: rgba(0,0,0,0.1);
    }
    body.dark-mode {
      --bg-color: #121212;
      --container-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --input-border: #333333;
      --stats-bg: #2c2c2c;
      --stats-text: #bbbbbb;
      --li-border: #333333;
      --empty-msg-color: #777777;
      --shadow-color: rgba(0,0,0,0.5);
    }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding: 50px 20px;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }
    .container {
      background: var(--container-bg);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px var(--shadow-color);
      width: 100%;
      max-width: 400px;
      transition: background-color 0.3s, box-shadow 0.3s;
      position: relative;
    }
    .theme-toggle-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      line-height: 1;
      transition: background-color 0.2s;
    }
    .theme-toggle-btn:hover {
      background-color: var(--stats-bg);
    }
    h1 {
      text-align: center;
      color: var(--text-color);
      margin-top: 0;
    }
    .input-group {
      display: flex;
      margin-bottom: 20px;
    }
    #todo-input {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--input-border);
      border-radius: 4px 0 0 4px;
      font-size: 16px;
      background-color: var(--container-bg);
      color: var(--text-color);
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
    }
    #todo-input:focus {
      outline: none;
      border-color: #28a745;
    }
    #add-btn {
      padding: 10px 15px;
      border: none;
      background-color: #28a745;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
    }
    #add-btn:hover {
      background-color: #218838;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 14px;
      color: var(--stats-text);
      background: var(--stats-bg);
      padding: 10px;
      border-radius: 4px;
      transition: background-color 0.3s, color 0.3s;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid var(--li-border);
      transition: border-bottom-color 0.3s;
    }
    li:last-child {
      border-bottom: none;
    }
    .todo-text {
      flex: 1;
      margin-left: 10px;
      word-break: break-all;
      font-size: 16px;
    }
    .completed .todo-text {
      text-decoration: line-through;
      color: var(--empty-msg-color);
    }
    .delete-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .delete-btn:hover {
      background-color: #c82333;
    }
    #empty-message {
      text-align: center;
      color: var(--empty-msg-color);
      font-style: italic;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <button id="theme-toggle" class="theme-toggle-btn" aria-label="切換深色模式">🌙</button>
  <h1>待辦清單</h1>

  <div class="input-group">
    <input type="text" id="todo-input" placeholder="輸入待辦事項...">
    <button id="add-btn">新增</button>
  </div>

  <div class="stats">
    <span>全部數量：<span id="total-count">0</span></span>
    <span>已完成數量：<span id="completed-count">0</span></span>
  </div>

  <ul id="todo-list"></ul>

  <div id="empty-message">目前沒有待辦事項，請新增一些吧！</div>
</div>

<script>
  const todoInput = document.getElementById('todo-input');
  const addBtn = document.getElementById('add-btn');
  const todoList = document.getElementById('todo-list');
  const totalCountEl = document.getElementById('total-count');
  const completedCountEl = document.getElementById('completed-count');
  const emptyMessage = document.getElementById('empty-message');
  const themeToggle = document.getElementById('theme-toggle');

  let todos = [];

  // 主題切換邏輯
  function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      themeToggle.textContent = '☀️';
    }
  }

  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    themeToggle.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  initTheme();

  function render() {
    todoList.innerHTML = '';

    if (todos.length === 0) {
      emptyMessage.style.display = 'block';
    } else {
      emptyMessage.style.display = 'none';
    }

    let completedCount = 0;

    todos.forEach((todo, index) => {
      if (todo.completed) completedCount++;

      const li = document.createElement('li');
      if (todo.completed) li.classList.add('completed');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', () => toggleTodo(index));

      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '刪除';
      deleteBtn.addEventListener('click', () => deleteTodo(index));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);

      todoList.appendChild(li);
    });

    totalCountEl.textContent = todos.length;
    completedCountEl.textContent = completedCount;
  }

  function addTodo() {
    const text = todoInput.value.trim();
    if (text !== '') {
      todos.push({ text: text, completed: false });
      todoInput.value = '';
      render();
    }
  }

  function toggleTodo(index) {
    todos[index].completed = !todos[index].completed;
    render();
  }

  function deleteTodo(index) {
    todos.splice(index, 1);
    render();
  }

  addBtn.addEventListener('click', addTodo);

  todoInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      addTodo();
    }
  });

  // 初始渲染
  render();
</script>

</body>
</html>
