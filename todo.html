<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待辦清單</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-top: 0;
    }
    .input-group {
      display: flex;
      margin-bottom: 20px;
    }
    #todo-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px 0 0 4px;
      font-size: 16px;
    }
    #todo-input:focus {
      outline: none;
      border-color: #28a745;
    }
    #add-btn {
      padding: 10px 15px;
      border: none;
      background-color: #28a745;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
    }
    #add-btn:hover {
      background-color: #218838;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
      background: #e9ecef;
      padding: 10px;
      border-radius: 4px;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    li:last-child {
      border-bottom: none;
    }
    .todo-text {
      flex: 1;
      margin-left: 10px;
      word-break: break-all;
      font-size: 16px;
    }
    .completed .todo-text {
      text-decoration: line-through;
      color: #888;
    }
    .delete-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .delete-btn:hover {
      background-color: #c82333;
    }
    #empty-message {
      text-align: center;
      color: #888;
      font-style: italic;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>待辦清單</h1>

  <div class="input-group">
    <input type="text" id="todo-input" placeholder="輸入待辦事項...">
    <button id="add-btn">新增</button>
  </div>

  <div class="stats">
    <span>全部數量：<span id="total-count">0</span></span>
    <span>已完成數量：<span id="completed-count">0</span></span>
  </div>

  <ul id="todo-list"></ul>

  <div id="empty-message">目前沒有待辦事項，請新增一些吧！</div>
</div>

<script>
  const todoInput = document.getElementById('todo-input');
  const addBtn = document.getElementById('add-btn');
  const todoList = document.getElementById('todo-list');
  const totalCountEl = document.getElementById('total-count');
  const completedCountEl = document.getElementById('completed-count');
  const emptyMessage = document.getElementById('empty-message');

  let todos = [];

  function render() {
    todoList.innerHTML = '';

    if (todos.length === 0) {
      emptyMessage.style.display = 'block';
    } else {
      emptyMessage.style.display = 'none';
    }

    let completedCount = 0;

    todos.forEach((todo, index) => {
      if (todo.completed) completedCount++;

      const li = document.createElement('li');
      if (todo.completed) li.classList.add('completed');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', () => toggleTodo(index));

      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '刪除';
      deleteBtn.addEventListener('click', () => deleteTodo(index));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);

      todoList.appendChild(li);
    });

    totalCountEl.textContent = todos.length;
    completedCountEl.textContent = completedCount;
  }

  function addTodo() {
    const text = todoInput.value.trim();
    if (text !== '') {
      todos.push({ text: text, completed: false });
      todoInput.value = '';
      render();
    }
  }

  function toggleTodo(index) {
    todos[index].completed = !todos[index].completed;
    render();
  }

  function deleteTodo(index) {
    todos.splice(index, 1);
    render();
  }

  addBtn.addEventListener('click', addTodo);

  todoInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      addTodo();
    }
  });

  // 初始渲染
  render();
</script>

</body>
</html>
